name: Build APK

on:
  release:
    types: [published]
  workflow_dispatch:
  pull_request:
    paths:
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/**"

jobs:
  guard-gen-dir:
    name: Guard src-tauri/gen/ stays uncommitted
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail if src-tauri/gen/ is tracked
        run: |
          set -euo pipefail
          # gen/ is regenerated on every build. It must never be committed.
          tracked=$(git ls-files src-tauri/gen/ | wc -l)
          if [ "$tracked" -ne 0 ]; then
            echo "##[error] Detected ${tracked} tracked file(s) under src-tauri/gen/. This directory is regenerated by 'tauri android init'/'tauri build' and must NOT be committed (see .gitignore)."
            git ls-files src-tauri/gen/
            exit 1
          fi
          echo "src-tauri/gen/ is correctly untracked."

  check:
    runs-on: ubuntu-latest
    needs: guard-gen-dir
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
          components: clippy

      - name: Check
        run: cargo check --lib --manifest-path src-tauri/Cargo.toml

      - name: Test
        run: cargo test --lib --manifest-path src-tauri/Cargo.toml

      - name: Clippy
        run: cargo clippy --lib --manifest-path src-tauri/Cargo.toml -- -D warnings

  build-android:
    # Full APK only on release / manual dispatch — not every PR.
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
          components: clippy

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager "ndk;27.0.12077973"
          yes | sdkmanager --uninstall "ndk;29.0.14206865" || true
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Android build-tools (apksigner)
        run: |
          yes | sdkmanager "build-tools;35.0.0"
          echo "$ANDROID_HOME/build-tools/35.0.0" >> $GITHUB_PATH

      - name: Bump version from tag
        if: github.event_name == 'release'
        run: bash ./scripts/bump-version.sh

      - name: Require release signing secrets
        if: github.event_name == 'release'
        env:
          KS_B64: ${{ secrets.OPEN_GRIND_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.OPEN_GRIND_KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.OPEN_GRIND_KEYSTORE_ALIAS }}
        run: |
          if [ -z "$KS_B64" ] || [ -z "$KS_PASS" ]; then
            echo "Missing OPEN_GRIND_KEYSTORE_BASE64 or OPEN_GRIND_KEYSTORE_PASSWORD secrets" >&2
            exit 1
          fi
          echo "Signing secrets present (alias=${KS_ALIAS:-open-grind})"

      - name: Decode keystore
        if: github.event_name == 'release'
        env:
          KS_B64: ${{ secrets.OPEN_GRIND_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.OPEN_GRIND_KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.OPEN_GRIND_KEYSTORE_ALIAS }}
        run: |
          echo "$KS_B64" | base64 -d > open-grind.keystore
          echo "OPEN_GRIND_KEYSTORE_PATH=$(pwd)/open-grind.keystore" >> $GITHUB_ENV
          echo "OPEN_GRIND_KEYSTORE_PASSWORD=$KS_PASS" >> $GITHUB_ENV
          echo "OPEN_GRIND_KEYSTORE_ALIAS=${KS_ALIAS:-open-grind}" >> $GITHUB_ENV

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        # MUST run before `tauri android init`. Tauri's init step captures
        # frontendDist (../dist) and wires it into the generated Gradle project.
        # If dist/ doesn't exist at init time, Tauri bakes in a stale asset path
        # and the frontend never gets copied into app/src/main/assets/ during
        # `tauri android build` — the resulting APK renders an empty WebView
        # (the v0.2.0-alpha.3 release shipped with zero web assets bundled).
        run: bun run build

      - name: Sanity-check dist exists
        run: |
          test -f dist/index.html || { echo "dist/index.html missing — frontend build failed"; exit 1; }
          echo "dist/ contains $(find dist -type f | wc -l) files"

      - name: Remove stale Android project
        # The committed gen/android may use an old package name; regenerate fresh.
        run: rm -rf src-tauri/gen/android

      - name: Initialize Android project
        run: bun run tauri android init
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Apply Doze / network patches
        run: bash ./scripts/android/apply-doze-patches.sh

      - name: Build APK
        run: bun run tauri android build --apk
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Verify APK contains frontend assets
        run: |
          set -euo pipefail
          APK_PATH=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found" >&2
            exit 1
          fi
          asset_count=$(unzip -l "$APK_PATH" | grep -cE "assets/(_app|index\.html)")
          if [ "$asset_count" -lt 2 ]; then
            echo "##[error] APK at $APK_PATH is missing frontend assets (found $asset_count assets/ entries matching _app or index.html)"
            echo "Frontend bundle did not get packaged; app will white-screen on launch."
            exit 1
          fi
          echo "Frontend assets present in APK ($asset_count matching entries)."

      - name: Sign APK (release)
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          APK_PATH=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found to sign" >&2
            exit 1
          fi
          echo "Signing $APK_PATH"
          apksigner sign \
            --ks "${OPEN_GRIND_KEYSTORE_PATH}" \
            --ks-pass "pass:${OPEN_GRIND_KEYSTORE_PASSWORD}" \
            --key-pass "pass:${OPEN_GRIND_KEYSTORE_PASSWORD}" \
            --ks-key-alias "${OPEN_GRIND_KEYSTORE_ALIAS:-open-grind}" \
            --v4-signing-enabled false \
            "$APK_PATH"
          apksigner verify --verbose "$APK_PATH"
          # The APK is now signed in place; -unsigned.apk is the signed build.
          # Ship a -signed.apk copy so the release asset name reflects reality;
          # upload only that file (the original -unsigned.apk is byte-identical
          # post-sign and previously caused user confusion about which to grab).
          cp "$APK_PATH" "${APK_PATH%.apk}-signed.apk" || true

      - name: Upload APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: open-grind-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
